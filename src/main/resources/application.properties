spring.application.name=centros-sass
server.port=8080
spring.devtools.restart.enabled=false

# ── DataSource — PostgreSQL + HikariCP ────────────────────────────────────────
# HikariCP es el pool de conexiones predeterminado de Spring Boot.
# Un "pool" reutiliza conexiones en vez de abrir una nueva por cada request
# (abrir conexiones a PostgreSQL es costoso: ~10-50ms cada una).
spring.datasource.url=jdbc:postgresql://localhost:5434/centro_dia_db
spring.datasource.username=postgres
spring.datasource.password=Juan1235
spring.datasource.driver-class-name=org.postgresql.Driver

# maximum-pool-size: máximo de conexiones simultáneas al DB
# minimum-idle: conexiones que HikariCP mantiene abiertas aunque no haya requests
# connection-timeout: ms que espera para obtener una conexión del pool antes de lanzar error
# idle-timeout: ms que una conexión inactiva puede quedarse en el pool
# max-lifetime: ms máximo de vida de una conexión (renovar antes de que el DB la cierre)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# open-in-view=false: desactiva el "Open Session in View" anti-pattern.
# Este flag hacía que Hibernate abriera una sesión en el controller ANTES de
# que TenantContext.set() se ejecutara en el servicio, causando queries al schema "public".
# Desactivarlo fuerza a que las queries se ejecuten dentro del servicio.
spring.jpa.open-in-view=false

# ddl-auto=validate: Hibernate verifica que las tablas existen con las columnas correctas,
# pero NO las crea ni modifica. Flyway es el responsable de crear/alterar esquemas.
# NUNCA usar create o create-drop en producción — borraría todos los datos.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Dialecto: le dice a Hibernate qué "sabor" de SQL generar (PostgreSQL-específico)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Dialecto: le dice a Hibernate qué "sabor" de SQL generar (PostgreSQL-específico)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway — Migraciones del schema public ────────────────────────────────────
# Flyway aplica scripts SQL en orden (V1, V2, V3...) y lleva un historial
# en la tabla flyway_schema_history para no aplicar el mismo script dos veces.
#
# locations: solo migramos el schema "public" (global/admin).
# Los schemas tenant_* los migra TenantProvisioningService con Flyway programático.
#
# baseline-on-migrate=true: si la tabla flyway_schema_history no existe todavía,
# Flyway asume que V1 ya está aplicado y arranca desde aquí.
# Útil cuando el DB ya tiene datos pero aún no tiene historial de Flyway.
spring.flyway.enabled=true
spring.flyway.locations=classpath:bbdd/migration/public
spring.flyway.schemas=public
spring.flyway.baseline-on-migrate=true
spring.flyway.table=flyway_schema_history
spring.flyway.connect-retries=3
logging.level.org.flywaydb=DEBUG

# ── JWT ───────────────────────────────────────────────────────────────────────
# Clave secreta para firmar tokens HMAC-SHA256.
# DEBE tener mínimo 256 bits (32 caracteres) para HS256.
# En producción usar una variable de entorno: JWT_SECRET=...
# NUNCA commitear una clave real a git.
jwt.secret=ioMwbQzDhfQefr8DYDNi4uq3MAFP7+PrCIW7OdjlIQo=
jwt.expiration=3600000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.centros_sass=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=DEBUG

# Desarrollo: crear .env con DB_PASSWORD=... y JWT_SECRET=...
# Producción: configurar en el sistema de secretos del servidor
# Generar JWT_SECRET seguro: openssl rand -base64 32
