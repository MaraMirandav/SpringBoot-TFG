# ── Perfil "test" — H2 en memoria para tests unitarios ───────────────────────
# IMPORTANTE: Este perfil es solo para tests ligeros con @ActiveProfiles("test").
# Para tests de integración que necesiten multitenancy real (search_path),
# usar Testcontainers con PostgreSQL real (ver AGENTS.md).
#
# H2 es una base de datos en memoria (vive mientras la JVM corre).
# DB_CLOSE_DELAY=-1: mantener la BD viva mientras la JVM esté activa.
spring.datasource.url=jdbc:h2:mem:saascon_test;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# create-drop: Hibernate crea las tablas al iniciar y las borra al cerrar.
# Correcto para H2 en tests — no hay datos reales que preservar.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Flyway desactivado en tests — ddl-auto=create-drop maneja el esquema
# Flyway necesita PostgreSQL real; H2 no soporta todas las sintaxis PG.
spring.flyway.enabled=false

# Clave JWT de prueba — no importa el valor, solo que tenga ≥32 chars para HS256
jwt.secret=test-secret-key-for-unit-tests-only-min-32chars!
