services:
  postgres-db:
    image: postgres:18
    container_name: centro_dia_db
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql

volumes:
  db_data: